apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-api
  template:
    metadata:
      labels:
        app: task-api
    spec:
      containers:
        - name: task-api
          image: harshilpanchal09/task-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: task-api-config